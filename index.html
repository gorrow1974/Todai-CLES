<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>東大の森 v8</title><style>
*{box-sizing:border-box}body{margin:0;background:#f7faf5;color:#111b13;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.app{max-width:980px;margin:auto;padding:14px 12px 92px}.top{display:flex;justify-content:space-between;align-items:flex-start}.logo{font-size:24px;font-weight:1000;color:#174a2b;line-height:1.05}.logo small{display:block;color:#111;font-size:14px}.pill{background:white;border-radius:999px;padding:8px 12px;font-weight:1000;box-shadow:0 6px 18px #0001}.mission{display:grid;grid-template-columns:76px 1fr 70px;gap:8px;align-items:center;margin:12px 0}.mission img{width:76px}.speech{background:white;border:3px solid #ffb24b;border-radius:22px;padding:13px;font-weight:1000;font-size:19px}.speech b{color:#f97316}.grid{display:grid;grid-template-columns:38% 1fr;gap:18px}.paper,.game,.hint,.result{background:white;border:1px solid #e3e9e2;border-radius:18px;box-shadow:0 12px 28px #0001}.paperHead{background:linear-gradient(#16834a,#0d6939);color:white;padding:12px 16px;font-size:20px;font-weight:1000;border-radius:18px 18px 0 0}.paperBody{padding:16px}.badge{border-radius:999px;padding:6px 10px;margin:3px;background:#e9f6ea;color:#166534;font-size:12px;font-weight:1000;display:inline-block}.dark{background:#14532d;color:white}.warn{background:#fff3d6;color:#8a4300}.passage{font-family:Georgia,serif;font-size:16px;line-height:1.58;white-space:pre-line}.question{font-size:20px;font-weight:1000;color:#0f3d25;margin-top:18px}.gameHead{background:linear-gradient(#10466f,#062d50);color:white;border-radius:18px 18px 0 0;padding:14px;font-size:24px;font-weight:1000;text-align:center}.timer{padding:14px;border-bottom:1px solid #edf2ef}.timerTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000}.timerTop b{font-size:34px;color:#f97316}.timerTop select{border:0;background:#eef4ff;border-radius:10px;padding:6px;font-weight:1000}.barOut{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.bar{height:100%;width:100%;background:#fb7c13}.lead{padding:10px 14px 2px}.lead h2{margin:0;font-size:22px}.lead p{margin:4px 0 0;color:#64748b;font-weight:900}.arrows{display:grid;gap:9px;padding:10px 14px}.arrow{display:grid;grid-template-columns:40px 1fr 22px;align-items:center;gap:10px;border:2px solid #d8e7f7;border-radius:16px;background:#f8fbff;padding:10px;text-align:left;font-weight:1000}.num{width:34px;height:34px;border-radius:50%;background:#1478e6;color:white;text-align:center;line-height:34px;font-size:19px}.main{font-size:21px}.sub{font-size:12px;color:#334155}.chev{font-size:24px;color:#1478e6}.arrow.correct{background:#dcfce7;border-color:#22c55e}.arrow.wrong{background:#fee2e2;border-color:#ef4444}.mini{display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:center;padding:0 14px 14px}.mini img{width:70px}.miniSpeech{background:#fff;border:2px solid #e5e7eb;border-radius:18px;padding:10px;font-weight:1000}.hints{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.hint{padding:14px;font-weight:900}.result{display:none;margin-top:14px;padding:16px}.result.show{display:block}.resultTop{display:grid;grid-template-columns:90px 1fr 80px;gap:10px;align-items:center}.resultTop img{width:86px}.resultMsg{font-size:20px;font-weight:1000}.ok{color:#1478e6}.teacher{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin-top:10px;font-weight:900}.answer{margin-top:14px;font-weight:900;line-height:1.55}.dash{margin-top:14px;background:#07345b;color:white;border-radius:16px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.big{font-size:25px;font-weight:1000}.lbl{font-size:12px;color:#cfe8ff;font-weight:900}.footer{position:fixed;left:0;right:0;bottom:0;padding:18px 14px;background:linear-gradient(transparent,#f7faf5 20%)}.nav{max-width:980px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.nav button{border:0;border-radius:22px;padding:15px;font-size:16px;font-weight:1000}.primary{background:#fb7c13;color:white}.secondary{background:#eef0f4}
@media(max-width:720px){.app{padding:12px 10px 90px}.pill{display:none}.mission{grid-template-columns:60px 1fr 54px}.mission img{width:60px}.speech{font-size:16px;padding:10px}.grid{grid-template-columns:1fr;gap:12px}.paperBody{padding:13px}.passage{font-size:15px}.question{font-size:18px}.gameHead{font-size:22px}.timerTop b{font-size:30px}.arrows{gap:7px}.arrow{padding:9px}.main{font-size:18px}.hints{grid-template-columns:1fr}.resultTop{grid-template-columns:70px 1fr}.resultTop img:last-child{display:none}.resultTop img{width:68px}.dash{font-size:12px}.big{font-size:20px}}
</style></head><body><div class="app"><div class="top"><div class="logo">🌳 東大の森 v8<small>Arrow Hunter</small></div><div class="pill">🔥 連続 <span id="streak">0</span> 問正解！</div></div><div class="mission"><img src="assets/bob_gotit.png"><div class="speech"><b>任務だ！</b> この話の流れを見つけよう！<br><span style="font-size:.82em">答えの前に、まず全体の流れをつかむんだ！</span></div><img src="assets/pat_question.png"></div><div class="grid"><section class="paper"><div class="paperHead">📄 問題用紙</div><div class="paperBody"><div id="badges"></div><div class="passage" id="passage"></div><div class="question" id="question"></div></div></section><section class="game"><div class="gameHead">この話は、どんな流れ？</div><div class="timer"><div class="timerTop"><span>⏳ 残り時間</span><span><b id="remain">15.0</b> 秒</span><select id="limit"><option>1</option><option>2</option><option>5</option><option>10</option><option>12</option><option selected>15</option><option>20</option><option>30</option></select></div><div class="barOut"><div class="bar" id="bar"></div></div></div><div class="lead"><h2>この話は、どんな流れ？</h2><p>いちばん合っている矢印の流れを選ぼう！</p></div><div class="arrows" id="arrows"></div><div class="mini"><div class="miniSpeech" id="mini">うーん…どれかな？<br>流れをイメージしてみよう！</div><img src="assets/bob_idea.png"></div></section></div><div class="hints"><div class="hint">💡 <b>ヒント！</b><br>つなぎ言葉や文の役割を見る。</div><div class="hint">🦉 <b>パットのアドバイス</b><br>最初と最後の文に注目！</div></div><div class="result" id="result"><div class="resultTop"><img id="resultPat" src="assets/pat_master.png"><div class="resultMsg" id="resultMsg"></div><img id="resultBob" src="assets/bob_gotit.png"></div><div class="teacher" id="teacher"></div><div class="answer" id="answer"></div></div><div class="dash"><div><div class="big" id="attempts">0</div><div class="lbl">挑戦回数</div></div><div><div class="big" id="rate">0%</div><div class="lbl">矢印正答率</div></div><div><div class="big" id="best">-</div><div class="lbl">最速</div></div><div><div class="big" id="avg">-</div><div class="lbl">平均</div></div></div></div><div class="footer"><div class="nav"><button class="secondary" id="prev">‹ 前の問題</button><button class="secondary" id="review">あとで見直す</button><button class="primary" id="next">次の問題 ›</button></div></div><script>
let D,Q,i=0,logs=[],timer=null,t0=0,limit=15;const E=x=>document.getElementById(x),cur=()=>Q[i],nid=()=>'att_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);fetch('questions.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{D=d;Q=d.questions;i=+localStorage.tf8i||0;logs=JSON.parse(localStorage.tf8logs||'[]');limit=+localStorage.tf8limit||15;bind();render()});function bind(){E('prev').onclick=()=>{i=(i-1+Q.length)%Q.length;render()};E('next').onclick=()=>{i=(i+1)%Q.length;render()};E('review').onclick=()=>alert('見直しリストは次版で保存します');E('limit').onchange=function(){limit=+this.value;save();startTimer()}}function save(){localStorage.tf8i=i;localStorage.tf8logs=JSON.stringify(logs);localStorage.tf8limit=limit}function render(){const q=cur();E('badges').innerHTML='<span class="badge dark">'+q.id+'</span><span class="badge">'+q.type+'</span><span class="badge warn">'+q.signal+'</span>';E('passage').textContent=D.passage;E('question').textContent=q.question;E('result').classList.remove('show');E('mini').innerHTML='うーん…どれかな？<br>流れをイメージしてみよう！';drawArrows();dash();startTimer()}function drawArrows(){const box=E('arrows');box.innerHTML='';D.arrows.forEach((a,n)=>{const b=document.createElement('button');b.className='arrow';b.innerHTML='<div class="num">'+(n+1)+'</div><div><div class="main">'+a.label+'</div><div class="sub">'+a.hint+'</div></div><div class="chev">›</div>';b.onclick=()=>choose(a.id,b);box.appendChild(b)})}function startTimer(){if(timer)clearInterval(timer);t0=Date.now();E('limit').value=String(limit);timer=setInterval(()=>{const s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('remain').textContent=r.toFixed(1);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#fb7c13':p>20?'#facc15':'#ef4444';if(r<=0){clearInterval(timer);timer=null;E('mini').innerHTML='時間切れ！<br>でも流れを選んでみよう。'}},100)}function finish(){const s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}function choose(id,btn){const q=cur(),sec=finish(),ok=id===q.correct;[...E('arrows').children].forEach((b,n)=>{b.disabled=true;if(D.arrows[n].id===q.correct)b.classList.add('correct')});if(!ok)btn.classList.add('wrong');logs.push({attemptId:nid(),timestamp:new Date().toISOString(),questionId:q.id,selectedArrow:id,expectedArrow:q.correct,arrowCorrect:ok,seconds:sec,limit,signal:q.signal,type:q.type,intent:q.intent});save();E('result').classList.add('show');E('resultPat').src=ok?'assets/pat_master.png':'assets/pat_sweat.png';E('resultBob').src=ok?'assets/bob_gotit.png':'assets/bob_timeout.png';E('resultMsg').innerHTML=(ok?'<span class="ok">正解！</span>':'もう一歩！')+'<br>この話は「'+D.arrows.find(a=>a.id===q.correct).label+'」の流れだったよ！';E('teacher').textContent='先生のねらい：'+q.intent;E('answer').innerHTML='<b>模範解答</b><br>'+q.answer+'<br><br><b>理由</b><br>'+q.why;dash()}function dash(){const ok=logs.filter(x=>x.arrowCorrect).length,ts=logs.map(x=>x.seconds).filter(x=>typeof x==='number');E('attempts').textContent=logs.length;E('rate').textContent=logs.length?Math.round(ok/logs.length*100)+'%':'0%';E('best').textContent=ts.length?Math.min(...ts).toFixed(2)+'秒':'-';E('avg').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length).toFixed(2)+'秒':'-';let st=0;for(let j=logs.length-1;j>=0;j--){if(logs[j].arrowCorrect)st++;else break}E('streak').textContent=st}</script></body></html>

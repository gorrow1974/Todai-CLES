<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>東大の森 v5</title><style>
body{margin:0;background:#f4f7f1;font-family:system-ui,sans-serif;color:#122017}.app{max-width:1180px;margin:auto;padding:14px 14px 100px}.head{display:flex;justify-content:space-between}.logo{font-size:28px;font-weight:1000;color:#19542d}.layout{display:grid;grid-template-columns:40% 1px 1fr;gap:18px}.div{border-left:3px dashed #24628f}.card{background:white;border:1px solid #d9e4d7;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 8px 24px #0001}.title,.game{background:linear-gradient(#10466f,#062d50);color:white;border-radius:14px;padding:14px 18px;font-weight:1000}.game{text-align:center;font-size:28px}.q{font-size:24px;font-weight:1000}.pass{font-family:Georgia,serif;white-space:pre-line;line-height:1.55;border:1px solid #ddd;border-radius:10px;padding:14px}.chars{display:grid;grid-template-columns:1fr 1fr;gap:10px}.char{display:flex;gap:10px;align-items:center}.face{width:70px;height:70px;flex:0 0 70px}.bubble{border:3px solid #e9812c;border-radius:18px;padding:10px;font-weight:1000}.pat .bubble{border-color:#2c8b3e}.row{display:grid;grid-template-columns:80px 1fr 130px;align-items:center;border:2px solid #ddd;border-radius:16px;margin:10px 0;padding:10px}.row b{font-size:34px}.sig{background:#fff3f4}.typ{background:#f0faee}.arr{background:#eef6ff}.ans{background:#fff7e8}button{border:0;border-radius:14px;padding:12px;font-weight:1000}.panel{display:none}.show{display:block}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice{text-align:left;background:#edf5ec}.correct{background:#dcfce7!important;color:#166534}.wrong{background:#fee2e2!important;color:#991b1b}.arrowBox{white-space:pre-line;text-align:center;background:#f8fff9;border:1px solid #cfe8d2;border-radius:16px;padding:14px;font-size:20px;font-weight:1000}.barOut{height:14px;background:#ddd;border-radius:999px;overflow:hidden}.bar{height:100%;width:100%;background:#22c55e}.dash{background:#07345b;color:white;border-radius:16px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr)}.num{font-size:28px;font-weight:1000}.footer{position:fixed;left:0;right:0;bottom:0;background:#f4f7f1;padding:12px}.nav{max-width:1180px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.primary{background:#174a2b;color:white}.secondary{background:#e5e7eb}select{padding:9px;border-radius:10px}@media(max-width:900px){.layout{display:block}.div{display:none}.choices,.chars,.dash{grid-template-columns:1fr}}
</style></head><body><div class="app"><div class="head"><div><div class="logo">🌳 東大の森 v5</div><div>学校型ランダム問題10問 / ボブとパット / キャラ修正版</div></div><select id="jump"></select></div><div class="layout"><section><div class="title">📖 問題用紙</div><div class="card"><div id="meta"></div><div class="pass" id="pass"></div><div class="q" id="q"></div><div class="card" style="background:#eef8ff"><b>💡ヒント</b><br>答えではなく、本文の役割と流れを見る。</div></div></section><div class="div"></div><section><div class="game">❔ この問題はどの型？</div><div class="chars"><div class="char"><svg class="face" viewBox="0 0 100 100" aria-label="ボブ"><path d="M22 36 C10 18 23 8 38 28" fill="#f28c28" stroke="#152018" stroke-width="4"/><path d="M66 28 C78 7 92 18 78 38" fill="#f28c28" stroke="#152018" stroke-width="4"/><circle cx="50" cy="52" r="36" fill="#f28c28" stroke="#152018" stroke-width="4"/><path d="M25 52 C28 77 72 78 76 52 C68 67 35 67 25 52Z" fill="#fff2d7"/><circle cx="36" cy="42" r="13" fill="white" stroke="#152018" stroke-width="3"/><circle cx="62" cy="42" r="13" fill="white" stroke="#152018" stroke-width="3"/><circle cx="37" cy="43" r="6" fill="#152018"/><circle cx="61" cy="43" r="6" fill="#152018"/><circle cx="25" cy="58" r="5" fill="#ff6b4a"/><circle cx="75" cy="58" r="5" fill="#ff6b4a"/><path d="M43 62 Q50 72 60 62" fill="none" stroke="#152018" stroke-width="5" stroke-linecap="round"/><path d="M18 62 C-2 70 5 92 28 82" fill="none" stroke="#8b4d1f" stroke-width="10" stroke-linecap="round"/></svg><div class="bubble">どの型かな？<br>よく読んでみよう！</div></div><div class="char pat"><svg class="face" viewBox="0 0 100 100" aria-label="パット"><path d="M22 32 L34 11 L43 34" fill="#8a5a2b" stroke="#152018" stroke-width="4"/><path d="M58 34 L70 11 L80 32" fill="#8a5a2b" stroke="#152018" stroke-width="4"/><circle cx="50" cy="53" r="36" fill="#8a5a2b" stroke="#152018" stroke-width="4"/><path d="M27 60 C31 79 69 79 73 60 C63 70 38 70 27 60Z" fill="#f7e0b8"/><ellipse cx="37" cy="43" rx="15" ry="13" fill="white" stroke="#152018" stroke-width="3"/><ellipse cx="63" cy="43" rx="15" ry="13" fill="white" stroke="#152018" stroke-width="3"/><path d="M25 42 H49 M51 42 H75" stroke="#152018" stroke-width="3"/><circle cx="39" cy="45" r="5" fill="#152018"/><circle cx="61" cy="45" r="5" fill="#152018"/><path d="M50 51 L42 62 H58 Z" fill="#f7b928" stroke="#152018" stroke-width="2"/><path d="M38 72 Q50 77 63 72" fill="none" stroke="#152018" stroke-width="4" stroke-linecap="round"/></svg><div class="bubble">本文の役割を<br>見抜くのがカギ。</div></div></div>
<div class="row sig"><div>STEP<br><b>1</b></div><div><h2>合図を探す</h2>設問から合図を見つける。</div><button data-p="p1">選ぶ</button></div><div class="card panel show" id="p1"><div class="choices" id="sig"></div><div id="sf"></div><div>秒数 <select id="lim"><option>1</option><option>2</option><option>5</option><option>10</option><option>12</option><option selected>15</option><option>20</option><option>30</option></select><div class="barOut"><div class="bar" id="bar"></div></div><div id="tm"></div></div></div>
<div class="row typ"><div>STEP<br><b>2</b></div><div><h2>型を選ぶ</h2>学校の型に当てはめる。</div><button data-p="p2">選ぶ</button></div><div class="card panel" id="p2"><div class="choices" id="typ"></div><div id="tf"></div></div>
<div class="row arr"><div>STEP<br><b>3</b></div><div><h2>矢印をつかむ</h2>本文の流れを矢印化。</div><button data-p="p3">見る</button></div><div class="card panel" id="p3"><div class="arrowBox" id="arr"></div><button class="primary" data-p="p4">答えへ</button></div>
<div class="row ans"><div>STEP<br><b>4</b></div><div><h2>答える</h2>最後に答える。</div><button data-p="p4">見る</button></div><div class="card panel" id="p4"><div class="arrowBox" id="ans"></div><div class="arrowBox" id="why"></div></div>
<div class="card" style="text-align:center;font-size:20px;font-weight:1000">答えは消える。型は残る。矢印はもっと残る。</div><div class="dash"><div><div class="num" id="a">0</div>冒険回数</div><div><div class="num" id="r">0%</div>型判定率</div><div><div class="num" id="b">-</div>最速</div><div><div class="num" id="g">-</div>平均</div></div></section></div></div><div class="footer"><div class="nav"><button id="prev" class="secondary">← 前へ</button><button id="next" class="primary">次へ →</button><button id="exp" class="secondary">CSV</button><button id="retry" class="secondary">もう一回</button></div></div><script>
let D,Q,i=0,logs=[],aid=null,t0=0,timer=null,limit=15;const E=x=>document.getElementById(x),sh=a=>a.slice().sort(()=>Math.random()-.5),cur=()=>Q[i],nid=()=>'att_'+Date.now();function pick(c,p,n){return sh([c,...sh(p.filter(x=>x!==c)).slice(0,n-1)])}function save(){localStorage.tf5i=i;localStorage.tf5logs=JSON.stringify(logs);localStorage.tf5lim=limit}
fetch('questions.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{D=d;Q=d.questions;i=+localStorage.tf5i||0;logs=JSON.parse(localStorage.tf5logs||'[]');limit=+localStorage.tf5lim||15;init();bind();render()})
function init(){Q.forEach((q,n)=>{let o=document.createElement('option');o.value=n;o.textContent=q.id+' '+q.type;E('jump').appendChild(o)})}
function bind(){E('jump').onchange=function(){i=+this.value;render()};E('prev').onclick=()=>{i=(i-1+Q.length)%Q.length;render()};E('next').onclick=()=>{i=(i+1)%Q.length;render()};E('retry').onclick=render;E('lim').onchange=function(){limit=+this.value;start();save()};document.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>panel(b.dataset.p));E('exp').onclick=csv}
function panel(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));E(id).classList.add('show')}
function render(){aid=null;let q=cur();E('jump').value=i;E('meta').innerHTML='<b>'+q.id+'</b> / '+q.source+' / '+q.type;E('pass').textContent=q.passage;E('q').textContent=q.question;['p2','p3','p4'].forEach(x=>E(x).classList.remove('show'));E('p1').classList.add('show');E('sf').innerHTML='';E('tf').innerHTML='';sig();typ();dash();start()}
function sig(){let q=cur(),box=E('sig');box.innerHTML='';pick(q.signal,D.signals,4).forEach(c=>{let b=document.createElement('button');b.className='choice';b.textContent=c;b.onclick=()=>{let t=finish(),ok=c===q.signal;aid=nid();mark('sig',q.signal,b,ok);logs.push({attemptId:aid,stage:'signal',questionId:q.id,selectedSignal:c,expectedSignal:q.signal,signalCorrect:ok,seconds:t,limit});save();E('sf').innerHTML=(ok?'⭕ 合図OK':'❌ 違う')+' '+t+'秒';panel('p2');dash()};box.appendChild(b)})}
function typ(){let q=cur(),box=E('typ');box.innerHTML='';pick(q.type,D.types,4).forEach(c=>{let b=document.createElement('button');b.className='choice';b.textContent=c;b.onclick=()=>{let ok=c===q.type;if(!aid)aid=nid();mark('typ',q.type,b,ok);logs.push({attemptId:aid,stage:'type',questionId:q.id,selectedType:c,expectedType:q.type,typeCorrect:ok});save();E('tf').innerHTML=ok?'⭕ 型OK':'❌ 違う';E('arr').textContent=q.arrow_answer;E('ans').textContent=q.answer;E('why').textContent='🦉 パット：'+q.why;panel('p3');dash()};box.appendChild(b)})}
function mark(box,c,btn,ok){[...E(box).children].forEach(b=>{b.disabled=true;if(b.textContent===c)b.classList.add('correct')});if(!ok)btn.classList.add('wrong')}
function start(){if(timer)clearInterval(timer);t0=Date.now();E('lim').value=limit;timer=setInterval(()=>{let s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#22c55e':p>20?'#facc15':'#ef4444';E('tm').textContent='残り '+r.toFixed(1)+'秒';if(r<=0)clearInterval(timer)},100)}
function finish(){let s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}
function dash(){let S=logs.filter(x=>x.stage==='signal'),T=logs.filter(x=>x.stage==='type'),ok=T.filter(x=>x.typeCorrect).length,ts=S.map(x=>x.seconds).filter(x=>typeof x==='number');E('a').textContent=S.length;E('r').textContent=T.length?Math.round(ok/T.length*100)+'%':'0%';E('b').textContent=ts.length?Math.min(...ts).toFixed(2)+'秒':'-';E('g').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length).toFixed(2)+'秒':'-'}
function csv(){let rows=['attemptId,stage,questionId,selectedSignal,expectedSignal,signalCorrect,seconds,limit,selectedType,expectedType,typeCorrect'];logs.forEach(x=>rows.push([x.attemptId,x.stage,x.questionId,x.selectedSignal||'',x.expectedSignal||'',x.signalCorrect??'',x.seconds??'',x.limit??'',x.selectedType||'',x.expectedType||'',x.typeCorrect??''].join(',')));let blob=new Blob([rows.join('\n')],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='todai_forest_v5_logs.csv';a.click()}
</script></body></html>

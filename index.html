<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>東大の森 v6 Arrow First</title><style>
*{box-sizing:border-box}body{margin:0;background:#f4f7f1;color:#122017;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:1220px;margin:auto;padding:14px 14px 106px}.head{display:flex;justify-content:space-between;align-items:center;gap:10px}.logo{font-size:28px;font-weight:1000;color:#19542d}.sub{font-size:13px;color:#64748b;font-weight:800}.layout{display:grid;grid-template-columns:42% 1px 1fr;gap:18px}.divider{border-left:3px dashed #24628f}.card{background:#fff;border:1px solid #d9e4d7;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 8px 24px #143f260f}.title,.game{background:linear-gradient(#10466f,#062d50);color:white;border-radius:14px;padding:14px 18px;font-weight:1000}.title{display:inline-block;font-size:24px}.game{text-align:center;font-size:28px}.badge{display:inline-block;border-radius:999px;padding:6px 10px;margin:3px;background:#eef7ee;color:#166534;font-size:12px;font-weight:1000}.dark{background:#124322;color:#fff}.warn{background:#fff3e8;color:#a33a13}.passage{font-family:Georgia,serif;white-space:pre-line;line-height:1.58;border:1px solid #d6dde4;border-radius:10px;padding:16px;background:#fbfbfb;font-size:17px}.q{font-size:25px;font-weight:1000;line-height:1.25;margin-top:14px}.chars{display:grid;grid-template-columns:1fr 1fr;gap:10px}.char{display:flex;gap:10px;align-items:center;background:white;border:1px solid #dfe9df;border-radius:18px;padding:10px}.face{width:70px;height:70px;flex:0 0 70px}.bubble{border:3px solid #e9812c;border-radius:18px;padding:10px;font-weight:1000}.pat .bubble{border-color:#2c8b3e}.arrows{display:grid;grid-template-columns:1fr 1fr;gap:12px}.arrowChoice{background:#eef6ff;border:2px solid #9dc6f2;border-radius:18px;padding:14px;cursor:pointer;font-weight:1000}.arrowChoice pre{font-family:inherit;text-align:center;font-size:22px;line-height:1.35;margin:8px 0;white-space:pre-line}.correct{background:#dcfce7!important;color:#166534;outline:3px solid #86efac}.wrong{background:#fee2e2!important;color:#991b1b;outline:3px solid #fecaca}.timer{background:#f8fafc;border:1px solid #dbe3df;border-radius:16px;padding:12px;margin-top:12px}.barOut{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:100%;width:100%;background:#22c55e}.small{font-size:12px;color:#64748b;font-weight:800}.result{display:none}.result.show{display:block}.box{white-space:pre-line;background:#f8fff9;border:1px solid #cfe8d2;border-radius:16px;padding:14px;font-size:18px;font-weight:900;line-height:1.55;margin-top:10px}.intent{background:#fff8e7;border-color:#f2c878}.answer{background:#eff6ff;border-color:#93c5fd}.why{background:#f0fdf4;border-color:#86efac}.dash{background:#07345b;color:white;border-radius:16px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.num{font-size:28px;font-weight:1000}.lbl{font-size:12px;color:#d5e9f7;font-weight:900}.motto{text-align:center;font-size:20px;font-weight:1000;background:#fff8e7;border:2px solid #f2c878;border-radius:14px;padding:14px;margin-top:12px}.footer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,#f4f7f1 25%);padding:30px 14px 12px}.nav{max-width:1220px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}button,select{border:0;border-radius:14px;padding:12px;font-weight:1000;font-size:15px}.primary{background:#174a2b;color:white}.secondary{background:#e5e7eb}@media(max-width:900px){.layout{display:block}.divider{display:none}.arrows,.chars,.dash{grid-template-columns:1fr}.passage{font-size:15px}}</style></head><body><div class="app"><div class="head"><div><div class="logo">🌳 東大の森 v6</div><div class="sub">Arrow First：この話どう流れてる？</div></div><select id="jump"></select></div><div class="layout"><section><div class="title">📖 問題用紙</div><div class="card"><div id="meta"></div><div class="passage" id="passage"></div><div class="q" id="question"></div></div></section><div class="divider"></div><section><div class="game">➡ この話どう流れてる？</div><div class="chars"><div class="char"><div id="bob"></div><div class="bubble">まず答えを探すな。<br>流れを見よう！</div></div><div class="char pat"><div id="pat"></div><div class="bubble">先生は何を<br>見たかったかな？</div></div></div><div class="card"><div class="arrows" id="arrows"></div><div id="fb" class="box result"></div><div class="timer">秒数 <select id="limit"><option>1</option><option>2</option><option>5</option><option>10</option><option>12</option><option selected>15</option><option>20</option><option>30</option></select><div class="barOut"><div class="bar" id="bar"></div></div><div class="small" id="tm"></div></div></div><div class="result" id="result"><div class="box intent" id="intent"></div><div class="box answer" id="answer"></div><div class="box why" id="why"></div></div><div class="motto">答えは消える。型は残る。<span style="color:#1f73c8">矢印はもっと残る。</span></div><div class="dash"><div><div class="num" id="a">0</div><div class="lbl">挑戦回数</div></div><div><div class="num" id="r">0%</div><div class="lbl">矢印正答率</div></div><div><div class="num" id="b">-</div><div class="lbl">最速</div></div><div><div class="num" id="g">-</div><div class="lbl">平均</div></div></div></section></div></div><div class="footer"><div class="nav"><button class="secondary" id="prev">← 前へ</button><button class="primary" id="next">次へ →</button><button class="secondary" id="export">CSV出力</button><button class="secondary" id="retry">もう一回</button></div></div><script>
const bobSvg='<svg class="face" viewBox="0 0 100 100"><circle cx="50" cy="52" r="36" fill="#f28c28" stroke="#152018" stroke-width="4"/><circle cx="36" cy="42" r="13" fill="white" stroke="#152018" stroke-width="3"/><circle cx="62" cy="42" r="13" fill="white" stroke="#152018" stroke-width="3"/><circle cx="37" cy="43" r="6"/><circle cx="61" cy="43" r="6"/><path d="M22 36 C10 18 23 8 38 28" fill="#f28c28" stroke="#152018" stroke-width="4"/><path d="M43 62 Q50 72 60 62" fill="none" stroke="#152018" stroke-width="5"/></svg>';const patSvg='<svg class="face" viewBox="0 0 100 100"><circle cx="50" cy="53" r="36" fill="#8a5a2b" stroke="#152018" stroke-width="4"/><ellipse cx="37" cy="43" rx="15" ry="13" fill="white" stroke="#152018" stroke-width="3"/><ellipse cx="63" cy="43" rx="15" ry="13" fill="white" stroke="#152018" stroke-width="3"/><circle cx="39" cy="45" r="5"/><circle cx="61" cy="45" r="5"/><path d="M50 51 L42 62 H58 Z" fill="#f7b928" stroke="#152018" stroke-width="2"/></svg>';
let D,Q,i=0,logs=[],t0=0,timer=null,limit=15;const E=x=>document.getElementById(x),cur=()=>Q[i],nid=()=>'att_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);fetch('questions.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{D=d;Q=d.questions;i=+localStorage.tf6i||0;logs=JSON.parse(localStorage.tf6logs||'[]');limit=+localStorage.tf6lim||15;init();bind();render()});function init(){E('bob').innerHTML=bobSvg;E('pat').innerHTML=patSvg;Q.forEach((q,n)=>{let o=document.createElement('option');o.value=n;o.textContent=q.id+' '+q.type;E('jump').appendChild(o)})}function bind(){E('jump').onchange=function(){i=+this.value;render()};E('prev').onclick=()=>{i=(i-1+Q.length)%Q.length;render()};E('next').onclick=()=>{i=(i+1)%Q.length;render()};E('retry').onclick=render;E('limit').onchange=function(){limit=+this.value;start();save()};E('export').onclick=csv}function save(){localStorage.tf6i=i;localStorage.tf6logs=JSON.stringify(logs);localStorage.tf6lim=limit}function render(){let q=cur();E('jump').value=i;E('meta').innerHTML='<span class="badge dark">'+q.id+'</span><span class="badge">'+q.type+'</span><span class="badge warn">'+q.signal+'</span>';E('passage').textContent=D.passage;E('question').textContent=q.question;E('fb').classList.remove('show');E('result').classList.remove('show');renderArrows();dash();start()}function renderArrows(){let box=E('arrows');box.innerHTML='';D.arrow_options.forEach(a=>{let b=document.createElement('button');b.className='arrowChoice';b.innerHTML='<div>'+a.label+'</div><pre>'+a.diagram+'</pre>';b.onclick=()=>choose(a.id,b);box.appendChild(b)})}function choose(id,btn){let q=cur(),sec=finish(),ok=id===q.correct_arrow;[...E('arrows').children].forEach((b,n)=>{b.disabled=true;if(D.arrow_options[n].id===q.correct_arrow)b.classList.add('correct')});if(!ok)btn.classList.add('wrong');logs.push({attemptId:nid(),timestamp:new Date().toISOString(),questionId:q.id,selectedArrow:id,expectedArrow:q.correct_arrow,arrowCorrect:ok,seconds:sec,limit:limit,signal:q.signal,type:q.type,teacherIntent:q.teacher_intent});save();E('fb').classList.add('show');E('fb').innerHTML=(ok?'⭕ 矢印OK':'❌ 矢印が違う')+'<br>'+sec+'秒';E('result').classList.add('show');E('intent').textContent='🦉 パット：'+q.teacher_intent;E('answer').textContent='✅ 答え：'+q.answer;E('why').textContent='➡ 理由：'+q.why;dash()}function start(){if(timer)clearInterval(timer);t0=Date.now();E('limit').value=String(limit);timer=setInterval(()=>{let s=(Date.now()-t0)/1000,r=Math.max(0,limit-s),p=Math.max(0,r/limit*100);E('bar').style.width=p+'%';E('bar').style.background=p>50?'#22c55e':p>20?'#facc15':'#ef4444';E('tm').textContent='残り '+r.toFixed(1)+'秒';if(r<=0)clearInterval(timer)},100)}function finish(){let s=(Date.now()-t0)/1000;if(timer)clearInterval(timer);return +s.toFixed(2)}function dash(){let ok=logs.filter(x=>x.arrowCorrect).length,ts=logs.map(x=>x.seconds).filter(x=>typeof x==='number');E('a').textContent=logs.length;E('r').textContent=logs.length?Math.round(ok/logs.length*100)+'%':'0%';E('b').textContent=ts.length?Math.min(...ts).toFixed(2)+'秒':'-';E('g').textContent=ts.length?(ts.reduce((a,b)=>a+b,0)/ts.length).toFixed(2)+'秒':'-'}function csv(){let h=['attemptId','timestamp','questionId','selectedArrow','expectedArrow','arrowCorrect','seconds','limit','signal','type','teacherIntent'];let rows=[h.join(',')];let C=v=>'"'+String(v??'').replace(/"/g,'""')+'"';logs.forEach(x=>rows.push(h.map(k=>C(x[k])).join(',')));let blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='todai_forest_v6_arrow_logs.csv';a.click();URL.revokeObjectURL(url)}</script></body></html>
